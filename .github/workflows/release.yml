name: Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for version calculation
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Get next version
        id: semver
        uses: ietf-wg-cellar/draft-fallon-ogp@v1
        with:
          release: false
          preRelease: false
      
      - name: Update version in gradle
        run: |
          sed -i 's/versionName = .*/versionName = "${{ steps.semver.outputs.nextVersion }}"/' app/build.gradle.kts
          echo "New version: ${{ steps.semver.outputs.nextVersion }}"
      
      - name: Run linting
        run: ./gradlew lint
      
      - name: Run tests
        run: ./gradlew test
      
      - name: Build release APK
        run: ./gradlew assembleRelease
      
      - name: Build AAB (App Bundle)
        run: ./gradlew bundleRelease
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semantic-release:
    runs-on: ubuntu-latest
    needs: release
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install semantic-release
        run: |
          npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/exec
      
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
